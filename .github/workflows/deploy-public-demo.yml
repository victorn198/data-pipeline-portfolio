name: Deploy public demo

on:
  push:
    branches: [main]
    paths:
      - "public-demo/**"
      - "assets/gallery/**"
      - ".github/workflows/deploy-public-demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build static public tour
        run: |
          mkdir -p _site/assets
          cp -R public-demo/. _site/
          cp -R assets/gallery _site/assets/gallery

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
